.mini-table{width:100%;font-size:11px;border-collapse:collapse}

.currency-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:11px}

</style>

const PORT={totalCAD:30746220,alloc:{'Cash':9.8,'Fixed Income':17.1,'Public Equity':26.7,'Private Credit':17.3,'Diversifying Strategies':5.6,'Real Assets':10.0,'Private Equity':13.5,'Monetary Hedge':0},ips:{'Cash':{min:0,target:3,max:54},'Fixed Income':{min:0,target:3,max:13},'Public Equity':{min:13,target:23,max:33},'Private Credit':{min:18,target:28,max:38},'Diversifying Strategies':{min:0,target:8,max:18},'Real Assets':{min:5,target:15,max:25},'Private Equity':{min:10,target:20,max:30},'Monetary Hedge':{min:0,target:3,max:5}},unfunded:[{fund:'Fortress Private Lending',class:'Private Credit',unfundedCAD:224194,call12m:false},{fund:'CarVal Clean Energy Fund II',class:'Private Credit',unfundedCAD:84360,call12m:true},{fund:'iCap Millennium International',class:'Diversifying Strategies',unfundedCAD:246208,call12m:false},{fund:'Blackstone SP Infrastructure IV',class:'Real Assets',unfundedCAD:691157,call12m:true},{fund:'Dalfen Last Mile Industrial V',class:'Real Assets',unfundedCAD:153271,call12m:false},{fund:'PQ SPVR 2022 LP',class:'Real Assets',unfundedCAD:229703,call12m:false},{fund:'Blue Owl GP Stakes VI',class:'Private Equity',unfundedCAD:1214973,call12m:false},{fund:'Genstar Capital Partners XI',class:'Private Equity',unfundedCAD:1159380,call12m:false},{fund:'Khosla Ventures Opp. II',class:'Private Equity',unfundedCAD:60669,call12m:false},{fund:'Khosla Ventures VIII',class:'Private Equity',unfundedCAD:186108,call12m:false},{fund:'Velocity Fund II',class:'Private Equity',unfundedCAD:334608,call12m:false},{fund:'Vista Equity Partners VIII-A',class:'Private Equity',unfundedCAD:235323,call12m:false}],fx:{'CAD':{pct:18.4,val:5657000},'USD':{pct:79.2,val:24371000},'EUR':{pct:1.4,val:430000},'GBP':{pct:1.0,val:308000}},feeNorms:{'Private Equity':'1.5–2.0% mgmt / 20% carry / 8% hurdle','Private Credit':'1.0–1.5% mgmt / 15–20% carry / 6–8% hurdle','Real Assets':'1.25–1.75% mgmt / 20% carry / 8% hurdle','Diversifying Strategies':'1.0–2.0% mgmt / 10–20% carry / varies','Public Equity':'0.5–1.0% mgmt / varies','Fixed Income':'0.3–0.75% mgmt','Cash':'<0.3% mgmt','Monetary Hedge':'varies'}};

  ans.A1={value:ASSET_CLASSES.includes(ac)?'Yes':'No',display:ASSET_CLASSES.includes(ac)?'Yes — IPS approved':'No — not an approved class',rationale:`${ac} is ${ASSET_CLASSES.includes(ac)?'one of the eight IPS-approved asset classes.':'NOT on the IPS approved list.'}`,locked:true,warning:!ASSET_CLASSES.includes(ac)};

async function fetchResearch(type,opp){
  const manager=opp.title;const assetClass=opp.assetClass;const today=new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'});
  const systemPrompt=`You are conducting investment due diligence for a Canadian family office (Robinson Family Office, Ontario-based, ~CAD $30M AUM). Search the web for current, factual information and return a structured JSON object. Be concise and flag anything material. Today is ${today}.`;
  const prompts={
    manager:`Search the web for current information about "${manager}" for investment due diligence. Find: litigation, regulatory actions, negative press, key-person departures, ownership changes, and any positive news (fund closes, awards, endorsements). Return ONLY valid JSON: {"summary":"2-3 sentence summary","overallSignal":"GREEN","findings":[{"type":"POSITIVE","headline":"headline","detail":"detail","source":"source"}],"searchedAt":"${today}"}. overallSignal: GREEN/AMBER/RED. type: FLAG/CAUTION/POSITIVE/NEUTRAL.`,
    industry:`Search the web for current industry dynamics for a ${assetClass} investment in "${manager}". Find: macro trends, valuation phenomena (e.g. sports franchise reset, PE secondary discounts, cap rate shifts), comparable fund performance, regulatory changes. Return ONLY valid JSON: {"summary":"2-3 sentence summary","overallSignal":"GREEN","findings":[{"type":"CAUTION","headline":"headline","detail":"detail","source":"source"}],"searchedAt":"${today}"}. overallSignal: GREEN/AMBER/RED. type: FLAG/CAUTION/POSITIVE/NEUTRAL.`,
    regulatory:`Search the web for Canadian regulatory and tax considerations for a Canadian family office LP investment in a ${assetClass} fund (${manager}). Find: CRA guidance, OSC/OSFI guidance, FAPI/anti-avoidance rules, Ontario-specific considerations. Return ONLY valid JSON: {"summary":"2-3 sentence summary","overallSignal":"GREEN","findings":[{"type":"NEUTRAL","headline":"headline","detail":"detail","source":"source"}],"searchedAt":"${today}"}. overallSignal: GREEN/AMBER/RED. type: FLAG/CAUTION/POSITIVE/NEUTRAL.`
  };
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,system:systemPrompt,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompts[type]}]})});
  if(resp.status===401||resp.status===403)throw new Error('STANDALONE_FILE');
  if(!resp.ok){const b=await resp.text().catch(()=>'');throw new Error(`API error ${resp.status}${b?': '+b.slice(0,120):''}`);}
  const data=await resp.json();
  const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!raw.trim())throw new Error('Empty response');
  const match=raw.replace(/```json|```/gi,'').trim().match(/\{[\s\S]*\}/);
  if(!match)throw new Error('No JSON in response');
  return JSON.parse(match[0]);
}

async function extractFromPDF(base64Data){
  const today=new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'});
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64Data}},{type:'text',text:`You are reading a Prime Quadrant investment research report. Today is ${today}. Extract all fields and return ONLY valid JSON (no markdown): {"title":"fund name","assetClass":"one of the 8 IPS classes","commitment":0,"currency":"USD","thesisSummary":"1-2 sentences","thesisRating":4,"returnTarget":"e.g. 12-16% net IRR","hasTrackRecord":true,"trackRecordDetail":"prior fund returns","teamSummary":"team overview","esgProgramme":"Mature/Developing/Nascent/None","esgApproach":"Impact/Integrated/ESG Aware/Opportunistic/None","esgNote":"","oddRatings":{"governance":"Low","compliance":"Low","operations":"Low","alignment":"Low","reporting":"Low"},"oddGovernanceNote":"","feesSummary":"fees","termsSummary":"LP rights","lpRightsNote":"","isOffshore":false,"vehicleType":"Delaware LP","feesAboveNorm":false,"feesBelowNorm":false,"additionalContext":""}. For commitment: use 0 if not stated. For thesisRating: 1-5 based on clarity. For fees: compare to norms (PE: 2%/20%, Credit: 1.5%/15-20%, Real Assets: 1.5%/20%). Use null for missing strings, false for missing booleans.`}]}]})});
  if(resp.status===401||resp.status===403)throw new Error('STANDALONE_FILE');
  if(!resp.ok)throw new Error('API error '+resp.status);
  const data=await resp.json();
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  const match=text.replace(/```json|```/gi,'').trim().match(/\{[\s\S]*\}/);
  if(!match)throw new Error('No JSON in extraction response');
  return JSON.parse(match[0]);
}

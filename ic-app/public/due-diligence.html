<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef}=React;
const h=React.createElement;
const api={
  async get(url){const r=await fetch(url,{credentials:'same-origin'});if(r.status===401){const e=new Error('UNAUTHENTICATED');e.code=401;throw e;}if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||'Request failed');return r.json();},
  async send(method,url,body){const r=await fetch(url,{method,credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});if(r.status===401){const e=new Error('UNAUTHENTICATED');e.code=401;throw e;}if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||'Request failed');return r.json();},
  post(url,body){return api.send('POST',url,body)},
  put(url,body){return api.send('PUT',url,body)},
  async del(url){const r=await fetch(url,{method:'DELETE',credentials:'same-origin'});if(r.status===401){const e=new Error('UNAUTHENTICATED');e.code=401;throw e;}if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||'Request failed');return r.json();},
};
function activityLabel(a){
  const amt=fmtCAD(a.amount*(ACTIVITY_FX[a.currency]||1));const from=a.decreaseClass||'External';const to=a.increaseClass||'External';
  return `${a.description} (${from} → ${to}, ${amt})`;
}
const IC_MEMBERS=[{id:'reg',name:'Reg Robinson',role:'Required',initials:'RR',color:'#1B2A4A'},{id:'sd',name:'Sheri-Dawn Robinson',role:'Required',initials:'SD',color:'#2A7D7B'},{id:'ross',name:'Ross Robinson',role:'Required',initials:'ROS',color:'#C9A84C'},{id:'lucas',name:'Lucas Robinson',role:'Optional',initials:'LR',color:'#7C3AED'}];
const ASSET_CLASSES=['Cash','Fixed Income','Public Equity','Private Equity','Private Credit','Diversifying Strategies','Real Assets','Monetary Hedge'];
function fmtCAD(n){return new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',maximumFractionDigits:0}).format(n)}
function fmtMoney(n,c){return new Intl.NumberFormat('en-CA',{style:'currency',currency:(!c||c==='Other')?'CAD':c,maximumFractionDigits:0}).format(n)}
function fmtDate(d){return new Date(d).toLocaleDateString('en-CA',{year:'numeric',month:'short',day:'numeric'})}
function pct(n){return n.toFixed(1)+'%'}

function computeClaudeAnswers(opp,activities){
  const p=opp.pqData||{};const cur=opp.currency;const cadFx={CAD:1,USD:1.3775,EUR:1.6075,GBP:1.72};const cadCommit=opp.commitment*(cadFx[cur]||1.35);const ac=opp.assetClass;const ips=PORT.ips[ac]||{min:0,target:10,max:20};
